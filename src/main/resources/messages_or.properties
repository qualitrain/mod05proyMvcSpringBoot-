consulta.articulos.btn.nota.contenido=ଏହି ଫର୍ମଟି GET ମାଧ୍ୟମରେ ସର୍ଭରକୁ ତଥ୍ୟ ପଠାଇବା ପାଇଁ ଡିଜାଇନ୍ କରାଯାଇଛି। ଅନୁସନ୍ଧାନ ତର୍କ ବ୍ୟାକଏଣ୍ଡ୍ (ଯଥା ସର୍ଭଲେଟ୍, JSP, Spring MVC) ରେ ପ୍ରାପ୍ତ ପାରାମିଟର ବ୍ୟବହାର କରି କାର୍ଯ୍ୟକାରୀ କରାଯିବା ଆବଶ୍ୟକ। ଫଳାଫଳ ଅନ୍ୟ ପୃଷ୍ଠାରେ କିମ୍ବା ସେହି ପୃଷ୍ଠାରେ ଦେଖାଯିବ।
