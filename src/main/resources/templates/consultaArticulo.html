<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{consulta.articulos.title}"></title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Opcional: Estilo personalizado para espaciado */
        body {
            background-color: #f8f9fa;
        }
        .card {
            margin-top: 2rem;
            border-radius: 0.5rem;
        }
        .btn-submit {
            background-color: #0d6efd;
            color: white;
        }
        .btn-submit:hover {
            background-color: #0b5ed7;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0" th:text="#{consulta.articulos.titulo}"></h4>
                </div>
                <div class="card-body">
                    <!-- Formulario de consulta: método GET (ideal para búsquedas) -->
                    <form action="buscarArticulos" method="get">
                        <!-- Campo: Clave de artículo -->
                        <div class="mb-3">
                            <label for="cveArticulo" class="form-label" th:text="#{articulo.clave}"></label>
                            <input type="text" class="form-control" id="cveArticulo" name="cveArticulo"
                                   th:attr="placeholder=#{consulta.articulos.clave.placeholder}" autocomplete="off"
                                   th:value="${articulo != null ? articulo.cveArticulo : ''}"
                            >
                            <div class="form-text" th:text="#{consulta.articulos.clave.hint}"></div>
                        </div>

                        <!-- Campo: Descripción -->
                        <div class="mb-3">
                            <label for="descripcion" class="form-label" th:text="#{articulo.descripcion}"></label>
                            <input type="text" class="form-control" id="descripcion" name="descripcion"
                                   th:attr="placeholder=#{consulta.articulos.descripcion.hint}" autocomplete="off"
                                   th:value="${articulo != null ? articulo.descripcion : ''}">
                        </div>

                        <!-- Campo: Costo proveedor 1 -->
                        <div class="mb-3">
                            <label for="costoProv1" class="form-label" th:text="#{articulo.costoProv1}"></label>
                            <input type="number" class="form-control" id="costoProv1" name="costoProv1"
                                   step="0.01" placeholder="0.00"
                                   th:value="${articulo != null ? #numbers.formatDecimal(articulo.costoProv1, 1, 2) : ''}"
                            >
                            <div class="form-text" th:text="#{consulta.articulos.costoProv1.hint}">Puedes ingresar un valor para filtrar por costo exacto.</div>
                        </div>

                        <!-- Campo: Precio de lista -->
                        <div class="mb-3">
                            <label for="precioLista" class="form-label" th:text="#{articulo.precioLista}"></label>
                            <input type="number" class="form-control" id="precioLista" name="precioLista"
                                   step="0.01" placeholder="0.00"
                                   th:value="${articulo != null ? #numbers.formatDecimal(articulo.precioLista, 1, 2) : ''}"
                            >
                        </div>

                        <!-- Botones de acción -->
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="reset" class="btn btn-secondary me-md-2" th:text="#{consulta.articulos.btn.limpiar}"></button>
                            <button type="submit" class="btn btn-primary" th:text="#{consulta.articulos.btn.buscar}"></button>
                        </div>
                    </form>
                </div>
            </div>
            <!-- Nota explicativa -->
            <div class="alert alert-info mt-3" role="alert">
                <strong><span th:text="#{consulta.articulos.btn.nota}"></span>:</strong> <span th:text="#{consulta.articulos.btn.nota.contenido}"></span>
            </div>
            <div class="alert alert-secondary mt-3" role="alert" th:text="${mensaje}">

            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS (opcional para funcionalidades como toggles, pero no es necesario para el envío) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
