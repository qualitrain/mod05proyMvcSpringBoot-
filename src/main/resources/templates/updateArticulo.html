<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Artículo</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{estilos.css}">
</head>
<body>
<div class="container">
    <div th:replace="~{index :: loguito}"></div>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Actualizar Artículo</h4>
                </div>
                <div class="card-body">
                <!-- Formulario de actualización con th:object y método POST -->
                <form th:action="@{/procesarInsercionArticulo}" th:object="${articulo}" method="post">
                    <!-- Clave de artículo -->
                    <div class="mb-3">
                        <label for="cveArticulo" class="form-label">Clave del artículo</label>
                        <input type="text" class="form-control" id="cveArticulo" th:field="*{cveArticulo}"
                               th:classappend="${resulValidacion != null
                                                   and #lists.size(resulValidacion.getFieldErrors('cveArticulo')) gt 0} ? 'border-danger' :''">
                        <!-- Mensajes de error resultados de la validacion -->
                        <div th:if="${resulValidacion !=null and
                                                  #lists.size(resulValidacion.getFieldErrors('cveArticulo')) gt 0}"
                             class="alert alert-warning mt-3" role="alert">
                            <!--div th:each="errorI : ${resulValidacion.getFieldErrors('cveArticulo')}"
                                 th:text="#{${errorI.defaultMessage}}">
                            </div-->
                            <div th:each="errorI : ${resulValidacion.getFieldErrors('cveArticulo')}"
                                 th:text="${errorI.defaultMessage}">
                            </div>
                        </div>
                    </div>

                    <!-- Descripción -->
                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <input type="text" class="form-control" id="descripcion" th:field="*{descripcion}">
                    </div>

                    <!-- Costo proveedor 1 -->
                    <div class="mb-3">
                        <label for="costoProv1" class="form-label">Costo proveedor 1</label>
                        <input type="number" step="0.01" class="form-control" id="costoProv1" th:field="*{costoProv1}">
                    </div>

                    <!-- Precio de lista -->
                    <div class="mb-3">
                        <label for="precioLista" class="form-label">Precio de lista</label>
                        <input type="number" step="0.01" class="form-control" id="precioLista" th:field="*{precioLista}">
                    </div>

                    <!-- Categoría (select desde mapa de categorías) -->
                    <div class="mb-3">
                        <label for="cveCategoria" class="form-label">Categoría</label>
                        <select id="cveCategoria" class="form-select" th:field="*{categoria.cveCategoria}">
                            <option value="">-- Seleccione una categoría --</option>
                            <option th:each="entry : ${categoriasMap}" th:value="${entry.value}" th:text="${entry.key}"></option>
                        </select>
                    </div>

                    <!-- Descontinuado (checkbox) -->
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="descontinuado" th:field="*{descontinuado}">
                        <label class="form-check-label" for="descontinuado">Descontinuado</label>
                    </div>

                    <!-- Fecha de última compra -->
                    <div class="mb-3">
                        <label for="fecUltimaCompra" class="form-label">Fecha de última compra</label>
                        <input type="date" class="form-control" id="fecUltimaCompra" th:field="*{fecUltimaCompra}">
                    </div>

                        <!-- Botones de acción -->
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <button type="button" class="btn btn-secondary me-md-2" onclick="history.back()">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar cambios</button>
                    </div>
                </form>
                </div>
            </div>
                <!-- Espacio para mensajes de éxito/error (opcional) -->
            <div class="alert alert-secondary mt-3 fw-bold text-danger" th:if="${mensaje}" th:text="${mensaje}"></div>
        </div>
    </div>
</div>

<!-- Bootstrap JS (opcional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
